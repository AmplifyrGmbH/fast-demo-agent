<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastDemo Builder</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="header">
  <div class="container" style="padding-top:0; padding-bottom:0;">
    <h1>FastDemo Builder</h1>
    <p>Amplifyr Digital — Demo-Website in 2–5 Minuten</p>
  </div>
</div>

<div class="container">

  <!-- Generate Form -->
  <div class="card">
    <div class="tabs">
      <button class="tab active" data-tab="domain">Domain scrapen</button>
      <button class="tab" data-tab="prompt">Neu erstellen</button>
    </div>

    <!-- Tab: Domain -->
    <div class="tab-panel" id="tab-domain">
      <div class="form-group">
        <label for="domain">Domain</label>
        <input type="text" id="domain" placeholder="muster-zahnarzt.ch" autocomplete="off" autocapitalize="none">
      </div>
      <div class="form-group">
        <label for="user_prompt">Anweisung <span class="label-hint">(optional)</span></label>
        <textarea id="user_prompt" placeholder="z.B. Moderner Look, warme Farben, Fokus auf Kinderzahnheilkunde"></textarea>
      </div>
      <button id="generate-btn" class="btn btn-primary">Demo generieren</button>
    </div>

    <!-- Tab: Prompt -->
    <div class="tab-panel hidden" id="tab-prompt">
      <div class="form-group">
        <label for="firmenname">Firmenname <span class="label-hint">(optional — für die URL)</span></label>
        <input type="text" id="firmenname" placeholder="Ristorante Bella Vista">
      </div>
      <div class="form-group">
        <label for="prompt-text">Beschreibung des Unternehmens</label>
        <textarea id="prompt-text" style="min-height:120px" placeholder="z.B. Italienisches Restaurant in Zürich-Oerlikon, seit 2005, Spezialitäten: Pasta und Fisch, familiäre Atmosphäre, Mittagsmenü Mo–Fr"></textarea>
      </div>
      <div class="form-group">
        <label>Bilder hochladen <span class="label-hint">(optional — Speisekarte, Fotos, max. 5)</span></label>
        <div class="upload-area" id="upload-area">
          <div class="upload-icon">📁</div>
          <div class="upload-text">Bilder hierher ziehen oder klicken</div>
          <div class="upload-hint">JPG, PNG, WEBP · max. 10 MB pro Datei</div>
          <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" multiple style="display:none">
        </div>
        <div class="file-preview" id="file-preview"></div>
      </div>
      <button id="prompt-btn" class="btn btn-primary">Website erstellen</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="card progress-card" id="progress-card">
    <div class="card-title">Fortschritt</div>
    <ul class="phase-list" id="phase-list"></ul>
    <div class="status-detail" id="status-detail"></div>
    <div class="result-link" id="result-link"></div>
  </div>

  <!-- Builds List -->
  <div class="card">
    <div class="card-title">Letzte Demos</div>
    <div id="builds-list">
      <div class="empty-state">Laden...</div>
    </div>
  </div>

</div>

<!-- Refine Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">Demo anpassen — <span id="modal-domain"></span></div>
    <div class="form-group">
      <label for="refine-prompt">Anpassungswunsch</label>
      <textarea id="refine-prompt" placeholder='z.B. "Hero-Bild austauschen", "Farbe blauer", "Leistungen prominenter"' style="min-height:100px"></textarea>
    </div>
    <div class="modal-actions">
      <button id="modal-cancel" class="btn btn-outline">Abbrechen</button>
      <button id="refine-btn" class="btn btn-primary">Anpassen starten</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
